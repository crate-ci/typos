# The way this works is the following:
#
# The create-release job runs purely to initialize the GitHub release itself
# and to output upload_url for the following job.
#
# The build-release job runs only once create-release is finished. It gets the
# release upload URL from create-release job outputs, then builds the release
# executables for each supported platform and attaches them as release assets
# to the previously created release. The Docker jobs then build and publish the
# release container image.
#
# Docker publishing is split in two stages: each platform image is built and
# pushed independently on a native runner, then a separate job creates the
# final tagged multi-arch manifest from those pushed images.
#
# The key here is that we create the release only once and only publish it once
# all release artifacts are ready.
#
# Reference:
# https://eugene-babichenko.github.io/blog/2020/05/09/github-actions-cross-platform-auto-releases/

name: post-release
on:
  push:
    tags:
    - "v*.*.*"
    - "!varcon*"

env:
  BIN_NAME: typos
  REGISTRY_IMAGE: crateci/typos

# We need this to be able to create releases.
permissions:
  contents: write

jobs:
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ env.TAG }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
    - name: Get the release version from the tag
      if: env.TAG == ''
      run: echo "TAG=${{ github.ref_name }}" >> $GITHUB_ENV
    - name: Show the tag
      run: |
        echo "tag is: $TAG"
    - name: Generate Release Notes
      run: |
        ./.github/workflows/release-notes.py --tag ${{ env.TAG }} --output notes-${{ env.TAG }}.md
        cat notes-${{ env.TAG }}.md
    - name: Create GitHub release
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release create $TAG --verify-tag --draft --title $TAG --notes-file notes-${{ env.TAG }}.md
  build-release:
    name: build-release
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        build: [linux, linux-aarch64, macos, macos-aarch64, win-msvc]
        include:
        - build: linux
          os: ubuntu-22.04
          rust: stable
          target: x86_64-unknown-linux-musl
        - build: linux-aarch64
          os: ubuntu-24.04-arm
          rust: stable
          target: aarch64-unknown-linux-musl
        - build: macos
          os: macos-latest
          rust: stable
          target: x86_64-apple-darwin
        - build: macos-aarch64
          os: macos-latest
          rust: stable
          target: aarch64-apple-darwin
        - build: win-msvc
          os: windows-2022
          rust: stable
          target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
    - name: Install packages (Ubuntu)
      if: matrix.build == 'linux' || matrix.build == 'linux-aarch64'
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends xz-utils liblz4-tool musl-tools
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ matrix.rust }}
        targets: ${{ matrix.target }}
    - name: Build release binary
      run: cargo build --target ${{ matrix.target }} --verbose --release
    - name: Build archive
      shell: bash
      run: |
        outdir="./target/${{ matrix.target }}/release"
        staging="${{ env.BIN_NAME }}-${{ needs.create-release.outputs.tag }}-${{ matrix.target }}"
        mkdir -p "$staging"/doc
        cp {README.md,LICENSE-*} "$staging/"
        cp {CHANGELOG.md,docs/*} "$staging/doc/"
        if [ "${{ matrix.os }}" = "windows-2022" ]; then
          cp "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}.exe" "$staging/"
          ls -l "$staging"
          cd "$staging"
          7z a "../$staging.zip" .
          echo "ASSET=$staging.zip" >> $GITHUB_ENV
        else
          cp "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}" "$staging/"
          ls -l "$staging"
          tar czf "$staging.tar.gz" -C "$staging" .
          echo "ASSET=$staging.tar.gz" >> $GITHUB_ENV
        fi
    - name: Upload release archive
      env:
        GH_TOKEN: ${{ github.token }}
      shell: bash
      run: |
        tag="${{ needs.create-release.outputs.tag }}"
        gh release upload "$tag" ${{ env.ASSET }}
  build-docker-image:
    name: build-docker-image (${{ matrix.platform }})
    needs: [create-release, build-release]
    strategy:
      fail-fast: false
      matrix:
        include:
        - platform: linux/amd64
          runner: ubuntu-24.04
        - platform: linux/arm64
          runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
    - name: Prepare platform pair
      shell: bash
      run: |
        platform="${{ matrix.platform }}"
        echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Build and push Docker image by digest
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: ${{ matrix.platform }}
        outputs: type=image,push-by-digest=true,name-canonical=true,push=true
        tags: ${{ env.REGISTRY_IMAGE }}
    - name: Export digest
      shell: bash
      run: |
        mkdir -p "${{ runner.temp }}/digests"
        digest="${{ steps.build.outputs.digest }}"
        touch "${{ runner.temp }}/digests/${digest#sha256:}"
    - name: Upload digest
      uses: actions/upload-artifact@v7
      with:
        name: digests-${{ env.PLATFORM_PAIR }}
        path: ${{ runner.temp }}/digests/*
        if-no-files-found: error
        retention-days: 1
  merge-docker-image:
    name: merge-docker-image
    needs: [create-release, build-docker-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Download digests
      uses: actions/download-artifact@v8
      with:
        path: ${{ runner.temp }}/digests
        pattern: digests-*
        merge-multiple: true
    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v6
      with:
        flavor: |
          latest=false
        images: ${{ env.REGISTRY_IMAGE }}
        tags: |
          type=semver,pattern={{version}},value=${{ needs.create-release.outputs.tag }}
          type=semver,pattern={{major}}.{{minor}},value=${{ needs.create-release.outputs.tag }}
          type=semver,pattern={{major}},value=${{ needs.create-release.outputs.tag }}
          type=raw,value=latest
    - name: Create manifest list and push
      working-directory: ${{ runner.temp }}/digests
      env:
        DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
      run: |
        docker buildx imagetools create \
          $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
          $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)
    - name: Inspect image
      run: docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}
  publish-release:
    name: Publish Release
    needs: [create-release, build-release, merge-docker-image]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
    - name: Publish Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release edit "${{ needs.create-release.outputs.tag }}" --draft=false
    - name: Update major tag
      uses: rickstaa/action-update-semver@v1
      with:
        major_version_tag_only: true
